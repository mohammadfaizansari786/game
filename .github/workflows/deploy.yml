name: Deploy to Scrapy Cloud

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt shub

      - name: Deploy spider bundle
        env:
          SHUB_APIKEY: ${{ secrets.SHUB_APIKEY }}
          SHUB_PROJECT_ID: ${{ secrets.SHUB_PROJECT_ID }}
        run: |
          if [ -z "$SHUB_PROJECT_ID" ]; then
            echo "::error::Missing SHUB_PROJECT_ID secret. Configure the Scrapy Cloud project ID in repository secrets."
            exit 1
          fi
          shub deploy "$SHUB_PROJECT_ID"
